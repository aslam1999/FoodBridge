<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteer Login | FoodBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-flex">
        <div class="logo">
          <a href="index.php">
            <img src="assets/logo.png" alt="FoodBridge" />
          </a>
        </div>
      </div>
    </header>
    <main class="container">
      <section class="login-form-section">
        <div class="login-icon">
          <img src="assets/volunteer.png" alt="Volunteer icon" />
        </div>

        <h1>Volunteer Login</h1>
        <p>Access your volunteer portal</p>

        <form
          class="login-form"
          id="volunteer-login-form"
          action="volunteer_login.php"
          method="POST"
        >
          <div class="form-group">
            <label for="volunteer-email"
              >Email Address <span class="required-star">*</span></label
            >
            <input
              type="email"
              id="volunteer-email"
              name="email"
              placeholder="volunteer@foodbridge.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="volunteer-password"
              >Password <span class="required-star">*</span></label
            >
            <div class="input-with-icon">
              <input
                type="password"
                id="volunteer-password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button type="button" class="toggle-password" id="toggle-pw">
                👁️
              </button>
            </div>
          </div>

          <div class="form-options">
            <p class="field-hint">
              Please contact support@foodbridge.org to reset your password.
            </p>
          </div>

          <button type="submit" class="btn-primary">Login</button>

          <a href="login.html" class="btn-secondary">Change Role</a>
          <p class="login-link">
            Don't have an account? <a href="register.html">Register here</a>
          </p>
        </form>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container footer-container">
        <div class="footer-left">
          <p>© 2026 FoodBridge</p>
        </div>

        <div class="footer-center">
          <p>Contact: support@foodbridge.org</p>
        </div>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
